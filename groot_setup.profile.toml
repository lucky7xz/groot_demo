# dR4ko - Glassroot Setup Profile
# Installation scripts for Demo 1 and Demo 2 tools.

# ┌─ Profile Settings ───────────────────────────────────────┐
x = 3
y = 1
header_art = '''
🛠️ Setup Center
'''

#==========================================
# ┌─ Setup Commands ───────────────────────┐
# └────────────────────────────────────────┘
[[commands]]
name = "📦 Install Demo 1 (DNF)"
description = "Installs packages for Demo 1: bastet, cmatrix, sl, moon-buggy, fortune, cowsay, fastfetch, etc."
command = "sudo dnf install -y bastet cmatrix telnet bmon sl moon-buggy fortune-mod cowsay fastfetch curl"
auto_close_execution = false
col = "A"
row = 0

[[commands]]
name = "🐹 Install Demo 2 (Go)"
description = "Installs Go-based tools for Demo 2: nachrichten, slides, and pomo."
command = "go install github.com/zMoooooritz/nachrichten@latest && go install github.com/maaslalani/slides@latest && go install github.com/Bahaaio/pomo@latest"
auto_close_execution = false
col = "B"
row = 0

[[commands]]
name = "🦀 Install Demo 3 (Rust & Scripts)"
description = "Installs rustnet via COPR, golazo, and tabiew via install scripts."
command = "sudo dnf copr enable domcyrus/rustnet -y && sudo dnf install rustnet -y && curl -fsSL https://raw.githubusercontent.com/0xjuanma/golazo/main/scripts/install.sh | bash && curl -sS https://raw.githubusercontent.com/shshemi/tabiew/main/install.sh | sh"
auto_close_execution = false
col = "C"
row = 0
